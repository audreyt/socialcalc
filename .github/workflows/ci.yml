name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck / build / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Typecheck (strict, if configured)
        shell: bash
        run: |
          if bun -e "const pkg = await Bun.file('./package.json').json(); process.exit(pkg.scripts?.['typecheck:strict'] ? 0 : 1)"; then
            bun run typecheck:strict
          else
            echo "typecheck:strict script not defined; skipping"
          fi

      - name: Build
        run: bun run build

      - name: Test
        # Use --parallel (matches `bun run test` locally). Serial `bun test`
        # on bun 1.3.13 Linux x64 has been segfaulting mid-run in CI
        # (https://bun.report/1.3.13/lt1bf2e2ce...). --parallel runs files in
        # separate worker processes and sidesteps the crashing path.
        run: bun test --parallel
