name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck / build / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Typecheck
        run: vp run typecheck

      - name: Typecheck (strict)
        run: vp run typecheck:strict

      - name: Build
        run: vp build

      - name: Test
        run: vp test

      - name: Test credibility guard (test/**/*.test.ts + e2e/**/*.spec.ts)
        run: vp run check:test-credibility

      - name: Verify package artifact
        run: |
          vp pm pack --out /tmp/socialcalc.tgz
          tar -tzf /tmp/socialcalc.tgz package/dist/SocialCalc.min.js
