name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck / build / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Typecheck (strict, if configured)
        shell: bash
        run: |
          if bun -e "const pkg = await Bun.file('./package.json').json(); process.exit(pkg.scripts?.['typecheck:strict'] ? 0 : 1)"; then
            bun run typecheck:strict
          else
            echo "typecheck:strict script not defined; skipping"
          fi

      - name: Build
        run: bun run build

      - name: Test
        run: vp test
