name: Release

# Tag-push release pipeline: independent parallel gates so no single
# expensive check (mutation testing, a 3-browser Playwright matrix, an
# external EtherCalc canary) serializes behind the others in one long-
# running job:
#
#   core              format, lint, typecheck, strict typecheck, build, unit
#                     tests, test credibility guard, Dafny verification, Lean
#                     generation, blocking high/critical dependency audit.
#   coverage          source-attributed coverage (`vp run test:coverage`),
#                     enforces the per-file/global floors in vite.config.ts.
#                     Uploads coverage/lcov-report + lcov.info even when a
#                     threshold fails, so the enforced number stays
#                     reviewable without a local re-run.
#   mutation          reusable `mutation.yml` full-scope workflow: discovers
#                     all 13 shipping modules from `ALL_MUTATE_FILES`, runs
#                     one fail-fast-disabled matrix leg per module, uploads
#                     each JSON report, then hard-fails unless every report
#                     and every measured/passing baseline is present.
#   playwright        real-browser suite across Chromium/Firefox/WebKit
#                     (e2e typecheck + credibility guard run first).
#   ethercalc-canary  pinned, networked EtherCalc candidate-tarball canary.
#
# None of the above have a graceful "skip if not wired in yet" fallback:
# every script/config they invoke is expected to exist on this branch, and
# a missing one fails loudly (a bare command-not-found/module-not-found
# error) rather than silently passing.
#
# `package` needs ALL FIVE above. It re-verifies the package-contract gate,
# packs the release tarball TWICE from a clean checkout and byte-compares
# the two results (refusing to release a non-deterministic build), retains
# exactly one, records its SHA-256 and npm integrity hash, captures a
# non-blocking moderate-severity dependency audit snapshot (scoped to the
# two documented, time-bounded dispositions in
# docs/security-disposition.json), and uploads that one tarball plus its
# integrity manifest and the audit snapshot as a single build artifact.
#
# Because `package` requires every one of the five gate jobs to succeed,
# and `publish` requires `package`, a red result anywhere in core/coverage/
# mutation/playwright/ethercalc-canary makes npm publish impossible for
# that tag — not merely discouraged, structurally unreachable.
#
# This workflow never publishes to npm on tag push. The manually-dispatched
# `publish` job is wired for npm Trusted Publishing (OIDC, no stored
# secret) but is inert until a human:
#   1. Registers this exact repo + workflow filename (release.yml) as a
#      Trusted Publisher for the `socialcalc` package on npmjs.com,
#   2. Creates a protected `npm-publish` GitHub Environment with required
#      reviewers (Settings -> Environments) so the gated job cannot fire
#      without an approval, even after a successful `workflow_dispatch`, and
#   3. Enables Settings -> General -> "Releases" -> "Enable release
#      immutability" for this repository (future releases only — it does
#      not retroactively lock releases published before it was turned on).
#      The publish job below FAILS the run if the published release does
#      not come back from the API with `"immutable": true`, specifically
#      so a missed step 3 is caught loudly at publish time instead of
#      silently shipping a mutable release.
# Until all three are done, any dispatch of the publish job will fail:
# without (1) at `npm publish` (no token exists to leak, and no third-party
# has been granted publish trust yet); without (3) at the immutability
# check after publish (the release itself still succeeds and is NOT rolled
# back — see that step's own comment for why an npm-side rollback would be
# actively harmful — but the job still ends red until (3) is fixed).
#
# Publish order is deliberately draft-first, matching GitHub's documented
# immutable-release flow: create a DRAFT release and attach the exact,
# already-integrity-verified tarball + manifest to it, verify the
# uploaded draft asset's content, and ONLY THEN run `npm publish`. The
# draft is published (made non-draft, at which point immutability locks
# in) after npm publish succeeds. This ordering means a failure in asset
# staging/verification never triggers the npm side effect at all — npm
# publish is irreversible, draft-release asset staging is not.
#
# Every `release` (core/coverage/mutation/playwright/ethercalc-canary/
# package) and `publish` job additionally requires a real tag ref
# (github.ref_type == 'tag', double-checked with a `refs/tags/v*` shell
# guard) so a `workflow_dispatch` run against a branch that happens to be
# named e.g. "v3.1.0" can never be mistaken for a release/publish of that
# version.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "PUBLISH" to allow the gated npm publish job to run for the dispatched tag'
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  core:
    name: core quality gates + blocking high-severity audit
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact-name: ${{ steps.version.outputs.artifact-name }}
    steps:
      - name: Checkout tag commit (exact SHA, no mutable ref)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Resolve and validate release version
        id: version
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" != "tag" || "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::GITHUB_REF ($GITHUB_REF, ref_type=$GITHUB_REF_TYPE) is not a version tag (refs/tags/v*); refusing to resolve a release version"
            exit 1
          fi
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG (version $VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact-name=socialcalc-release-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277 # v1.1.0
        with:
          cache: true

      - name: Setup Dafny
        uses: dafny-lang/setup-dafny-action@be023fc606339d46ed6b077dcb8614d0279ded31 # v1.9.1
        with:
          dafny-version: "4.9.0"

      - name: Install dependencies (frozen lockfile)
        run: vp install --frozen-lockfile

      - name: Check formatting, lint, and types
        run: vp check

      - name: Typecheck (strict)
        run: vp run typecheck:strict

      - name: Build
        run: vp build

      - name: Check generated bundle formatting
        run: vp fmt dist/SocialCalc.js --check

      - name: Test
        run: vp test

      - name: Test credibility guard (test/**/*.test.ts + e2e/**/*.spec.ts)
        run: vp run check:test-credibility

      - name: Verify Dafny models
        run: vp run verify:dafny

      - name: Generate Lean models
        run: vp run verify:lean:gen

      - name: Assert Lean artifacts non-empty
        run: |
          set -euo pipefail
          for f in lemma/a1.types.lean lemma/a1.def.lean lemma/a1.proof.lean \
                   lemma/eval-ops.types.lean lemma/eval-ops.def.lean lemma/eval-ops.proof.lean \
                   lemma/lookup-result.types.lean lemma/lookup-result.def.lean lemma/lookup-result.proof.lean; do
            test -s "$f"
          done

      - name: Dependency audit — high/critical (blocking)
        run: |
          set -euo pipefail
          # Fails the release if any high or critical finding is present.
          # Currently 0 (all 2 high findings this repo carried were fixed via
          # package.json "overrides" — see docs/security-disposition.json
          # "summary.fixed"). This step exits non-zero on a real regression;
          # it is not a snapshot, it gates the release.
          vp pm audit --level high

  coverage:
    name: source-attributed coverage
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout tag commit (exact SHA, no mutable ref)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277 # v1.1.0
        with:
          cache: true

      # actions/setup-node v4.4.0 — release coverage invokes the Chromium
      # Playwright gate and e2e/server.ts's Node strip-types loader. Pin Node
      # 24 explicitly rather than inheriting the runner image default.
      - name: Setup Node 24 (release coverage runtime)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Install dependencies (frozen lockfile)
        run: vp install --frozen-lockfile

      - name: Install Chromium for merged coverage
        run: vp exec playwright install --with-deps chromium

      - name: Duplicate-bundle coverage attribution regression
        run: vp run check:coverage-attribution
      - name: Source-attributed coverage (per-file + global floors)
        run: |
          set -euo pipefail
          vp run test:coverage:merged 2>&1 | tee coverage-output.log

      # Runs even when the step above failed a threshold: the report files
      # are written to disk by the coverage run itself before the
      # threshold check sets a nonzero exit, so they exist either way —
      # only their upload was previously conditional on success, which
      # made a failing (i.e. exactly the interesting) run's report
      # unreviewable without a local re-run.
      - name: Extract the exact coverage text summary into the job summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "### Coverage report — ${{ github.ref_name }} @ ${{ github.sha }}"
            echo '```'
            awk '/Coverage report from v8/,/^=+$/' coverage-output.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload source-attributed coverage report (even on a failed threshold)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report-${{ github.ref_name }}-${{ github.sha }}
          path: |
            coverage-merged/lcov-report/
            coverage-merged/lcov.info
            coverage-output.log
          if-no-files-found: error
          retention-days: 90

  mutation:
    name: full mutation testing
    if: github.ref_type == 'tag'
    uses: ./.github/workflows/mutation.yml
    with:
      scope: full
      enforce_release: true
    permissions:
      contents: read

  playwright:
    name: browser matrix (Chromium/Firefox/WebKit)
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout tag commit (exact SHA, no mutable ref)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277 # v1.1.0
        with:
          cache: true

      - name: Install dependencies (frozen lockfile)
        run: vp install --frozen-lockfile

      - name: Typecheck e2e suite (strict)
        run: vp exec tsc --noEmit -p e2e/tsconfig.json

      - name: Test credibility guard (test/**/*.test.ts + e2e/**/*.spec.ts)
        run: vp run check:test-credibility

      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium firefox webkit

      - name: Build (normal + minified UMD bundles)
        run: vp build --minify

      - name: Run browser suite
        run: vp run test:browser

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-${{ github.ref_name }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  ethercalc-canary:
    name: pinned EtherCalc candidate-tarball canary
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout tag commit (exact SHA, no mutable ref)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277 # v1.1.0
        with:
          cache: true

      - name: Install dependencies (frozen lockfile)
        run: vp install --frozen-lockfile

      - name: EtherCalc canary
        run: vp run test:ethercalc-canary

  package:
    name: package-contract gate + deterministic pack-twice release artifact
    needs: [core, coverage, mutation, playwright, ethercalc-canary]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ needs.core.outputs.version }}
      artifact-name: ${{ needs.core.outputs.artifact-name }}
    steps:
      - name: Checkout tag commit (exact SHA, no mutable ref)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277 # v1.1.0
        with:
          cache: true

      - name: Install dependencies (frozen lockfile)
        run: vp install --frozen-lockfile

      - name: Package artifact gate
        run: vp run test:package-contract

      - name: Pack twice and byte-compare (refuse a non-deterministic build)
        id: pack
        run: |
          set -euo pipefail
          mkdir -p dist-release
          VERSION="${{ needs.core.outputs.version }}"
          FIRST="dist-release/socialcalc-$VERSION.pack1.tgz"
          SECOND="dist-release/socialcalc-$VERSION.pack2.tgz"
          vp pm pack --out "$FIRST"
          vp pm pack --out "$SECOND"
          SHA1="$(sha256sum "$FIRST" | awk '{print $1}')"
          SHA2="$(sha256sum "$SECOND" | awk '{print $1}')"
          if [ "$SHA1" != "$SHA2" ]; then
            echo "::error::pack is non-deterministic: first pack sha256=$SHA1, second pack sha256=$SHA2 — refusing to release"
            exit 1
          fi
          TARBALL="dist-release/socialcalc-$VERSION.tgz"
          mv "$FIRST" "$TARBALL"
          rm -f "$SECOND"
          MEMBERS="dist-release/package-members.txt"
          tar -tzf "$TARBALL" > "$MEMBERS"
          for member in package/dist/SocialCalc.js package/dist/SocialCalc.min.js \
                        package/dist/SocialCalc.d.ts package/dist/socialcalc.css; do
            grep -Fxq "$member" "$MEMBERS" || {
              echo "::error::packed tarball missing expected member: $member"
              exit 1
            }
          done
          rm -f "$MEMBERS"
          echo "Pack is deterministic (sha256=$SHA1 both times); retained one tarball."
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Record SHA-256 and npm integrity hash
        run: |
          set -euo pipefail
          TARBALL="${{ steps.pack.outputs.tarball }}"
          SHA256="$(sha256sum "$TARBALL" | awk '{print $1}')"
          INTEGRITY="sha512-$(openssl dgst -sha512 -binary "$TARBALL" | openssl base64 -A)"
          MANIFEST="${TARBALL}.integrity.json"
          cat > "$MANIFEST" <<EOF
          {
            "file": "$(basename "$TARBALL")",
            "sha256": "$SHA256",
            "integrity": "$INTEGRITY",
            "tag": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}"
          }
          EOF
          {
            echo "### Release artifact"
            echo "- tarball: \`$(basename "$TARBALL")\`"
            echo "- sha256: \`$SHA256\`"
            echo "- integrity: \`$INTEGRITY\`"
            echo "- pack determinism: verified identical across two independent \`vp pm pack\` runs"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dependency audit — moderate snapshot (recorded, non-blocking)
        run: |
          set -euo pipefail
          # Captured solely to evidence the two documented, time-bounded
          # moderate dispositions in docs/security-disposition.json
          # (brace-expansion GHSA-jxxr-4gwj-5jf2, uuid GHSA-w5hq-g745-h8pq —
          # each carries its own re-audit expiryCondition there). Both are
          # devDependency-only and never reach the published npm tarball;
          # this step does not gate the release (the blocking high/critical
          # gate already ran in the `core` job), it archives the raw report
          # for the next human re-audit against that disposition file's
          # expiry conditions.
          vp pm audit --level low --json > dist-release/audit.json 2>dist-release/audit.log || true
          {
            echo "### Dependency audit — moderate snapshot (vp pm audit --level low)"
            echo "Non-blocking; compare against docs/security-disposition.json's two accepted, time-bounded moderate dispositions."
            echo '```json'
            cat dist-release/audit.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload the one exact release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ needs.core.outputs.artifact-name }}
          path: |
            dist-release/*.tgz
            dist-release/*.integrity.json
            dist-release/audit.json
          if-no-files-found: error
          retention-days: 90

  publish:
    name: npm trusted publish (manual, gated — never runs on tag push)
    needs: package
    if: github.event_name == 'workflow_dispatch' && github.ref_type == 'tag' && inputs.confirm == 'PUBLISH'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Assert dispatch targeted a real release tag
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" != "tag" || "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::publish must be dispatched against a real vX.Y.Z tag ref (got ref_type=$GITHUB_REF_TYPE ref=$GITHUB_REF)"
            exit 1
          fi

      # Needed for scripts/verify-registry-smoke.mjs + scripts/lib/
      # sheet-smoke.mjs (the registry-smoke step) — a plain checkout, no
      # build/install: those two files have zero dependencies of their own.
      - name: Checkout tag commit (exact SHA, no mutable ref)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Download the one exact release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.package.outputs.artifact-name }}
          path: dist-release

      # Every check here runs BEFORE any side effect (draft release
      # creation or npm publish) below. sha256/integrity alone only prove
      # the bytes weren't corrupted in transit between jobs; they do NOT
      # prove this artifact was built for THIS tag/commit/version — a
      # manifest could be internally self-consistent (its own sha256 field
      # matches its own paired tarball) while still being the artifact
      # from a completely different, unrelated tag if e.g. artifact
      # retention/naming ever got confused. The tag/commit/file/version
      # cross-checks close that gap.
      - name: Verify downloaded artifact integrity and provenance
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dist-release
          tgz_files=(*.tgz)
          manifest_files=(*.integrity.json)
          if [ "${#tgz_files[@]}" -ne 1 ]; then
            echo "::error::expected exactly one .tgz in the downloaded artifact, found ${#tgz_files[@]}"
            exit 1
          fi
          if [ "${#manifest_files[@]}" -ne 1 ]; then
            echo "::error::expected exactly one .integrity.json in the downloaded artifact, found ${#manifest_files[@]}"
            exit 1
          fi
          TARBALL="${tgz_files[0]}"
          MANIFEST="${manifest_files[0]}"

          RECORDED_FILE="$(node -p "require('./$MANIFEST').file")"
          RECORDED_TAG="$(node -p "require('./$MANIFEST').tag")"
          RECORDED_COMMIT="$(node -p "require('./$MANIFEST').commit")"
          RECORDED_SHA256="$(node -p "require('./$MANIFEST').sha256")"
          RECORDED_INTEGRITY="$(node -p "require('./$MANIFEST').integrity")"

          if [ "$RECORDED_FILE" != "$TARBALL" ]; then
            echo "::error::manifest \"file\" ($RECORDED_FILE) does not match the actual downloaded tarball name ($TARBALL)"
            exit 1
          fi
          if [ "$RECORDED_TAG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::manifest \"tag\" ($RECORDED_TAG) does not match this run's tag ($GITHUB_REF_NAME) — artifact was built for a different release"
            exit 1
          fi
          if [ "$RECORDED_COMMIT" != "$GITHUB_SHA" ]; then
            echo "::error::manifest \"commit\" ($RECORDED_COMMIT) does not match this run's commit ($GITHUB_SHA) — artifact was built from a different commit"
            exit 1
          fi

          ACTUAL_SHA256="$(sha256sum "$TARBALL" | awk '{print $1}')"
          ACTUAL_INTEGRITY="sha512-$(openssl dgst -sha512 -binary "$TARBALL" | openssl base64 -A)"
          if [ "$ACTUAL_SHA256" != "$RECORDED_SHA256" ]; then
            echo "::error::sha256 mismatch for $TARBALL: recorded $RECORDED_SHA256, actual $ACTUAL_SHA256"
            exit 1
          fi
          if [ "$ACTUAL_INTEGRITY" != "$RECORDED_INTEGRITY" ]; then
            echo "::error::integrity mismatch for $TARBALL: recorded $RECORDED_INTEGRITY, actual $ACTUAL_INTEGRITY"
            exit 1
          fi

          mkdir -p /tmp/publish-verify-extract
          tar -xzf "$TARBALL" -C /tmp/publish-verify-extract
          TARBALL_PKG_VERSION="$(node -p "require('/tmp/publish-verify-extract/package/package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TARBALL_PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tarball's package.json version ($TARBALL_PKG_VERSION) does not match the tag's version ($TAG_VERSION)"
            exit 1
          fi

          echo "Verified $TARBALL: file/tag/commit match this run, sha256+integrity match the manifest, packed package.json version ($TARBALL_PKG_VERSION) matches the tag."
          {
            echo "tarball-path=./dist-release/$TARBALL"
            echo "tarball-name=$TARBALL"
            echo "manifest-path=./dist-release/$MANIFEST"
            echo "manifest-name=$MANIFEST"
            echo "sha256=$ACTUAL_SHA256"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node (npm >= 11.5.1 required for OIDC trusted publishing)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Draft-first, matching GitHub's documented immutable-release flow:
      # create the release as a draft, attach the exact already-verified
      # tarball + manifest, and verify the uploaded asset's content —
      # ALL before `npm publish` runs below. `--verify-tag` additionally
      # requires the tag to already exist and match this run's commit,
      # refusing to create a release against a stale/wrong tag.
      - name: Create DRAFT GitHub Release with the exact verified tarball + manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ github.ref_name }}" \
            --draft \
            --verify-tag \
            "${{ steps.verify.outputs.tarball-path }}" \
            "${{ steps.verify.outputs.manifest-path }}" \
            --title "${{ github.ref_name }}" \
            --notes "Publishing socialcalc@${{ needs.package.outputs.version }} to npm. Tarball sha256: ${{ steps.verify.outputs.sha256 }}."

      # GitHub Releases does NOT guarantee byte-for-byte preservation of
      # uploaded gzip tarball (.tgz) assets — it can normalize/recompress
      # them on the release-asset storage path, so the downloaded bytes can
      # differ from the uploaded bytes even though the underlying package
      # content is identical. A raw whole-file sha256sum comparison of a
      # round-tripped .tgz asset is therefore an unreliable gate that fires
      # on innocent recompression.
      #
      # Instead, we extract the downloaded draft asset and compare its
      # package/ directory tree byte-for-byte against the already-verified
      # local tarball (extracted to /tmp/publish-verify-extract by the step
      # above). This verifies that the same package content was attached to
      # the release, while being robust to gzip-level recompression. The
      # npm publish below still uses the local, Actions-artifact-verified
      # tarball — not the downloaded draft asset — so the security property
      # (publishing exactly what was integrity-verified) is fully preserved.
      - name: Verify the draft release asset's content before publishing to npm
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p draft-asset-check
          gh release download "${{ github.ref_name }}" \
            --pattern "${{ steps.verify.outputs.tarball-name }}" \
            --dir draft-asset-check
          mkdir -p /tmp/draft-asset-extract
          tar -xzf "draft-asset-check/${{ steps.verify.outputs.tarball-name }}" -C /tmp/draft-asset-extract
          if ! diff -r /tmp/publish-verify-extract/package /tmp/draft-asset-extract/package; then
            echo "::error::draft release asset content differs from the locally-verified tarball — the uploaded asset does not match the package being published"
            exit 1
          fi
          echo "Draft release asset content verified: extracted package/ tree matches the locally-verified tarball."

      # The one irreversible step in this job. Everything above only
      # staged/verified a draft GitHub Release (freely deletable); nothing
      # below can be un-published from npm on a later failure, so nothing
      # that could still fail runs before this except pure verification.
      - name: Publish exact verified tarball with provenance (OIDC, no token secret)
        run: npm publish "${{ steps.verify.outputs.tarball-path }}" --provenance

      - name: Publish the draft GitHub Release (immutability locks in here, if the repo setting is enabled)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false

      # Confirms prerequisite 3 from this file's header comment (Settings
      # -> General -> Releases -> "Enable release immutability") was
      # actually done, rather than assuming it. Deliberately does NOT roll
      # back the npm publish or delete the GitHub Release on failure here:
      # npm publish is already irreversible, and deleting a just-published
      # GitHub Release would destroy the only tamper-evident record of
      # exactly what was published — a human fixing the repo setting and
      # re-running this check (or accepting the gap for this one release)
      # is safer than automation deleting release history.
      - name: Verify the published release actually came back immutable
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          IMMUTABLE="$(gh api "repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" --jq '.immutable')"
          if [ "$IMMUTABLE" != "true" ]; then
            echo "::error::published release ${{ github.ref_name }} came back with immutable=$IMMUTABLE, not true. The npm package IS published (this cannot be undone). Fix: enable Settings -> General -> Releases -> \"Enable release immutability\" for this repository (applies to future releases only), then re-tag or otherwise ensure this release's supply-chain evidence is trusted through another channel."
            exit 1
          fi
          echo "Confirmed: release ${{ github.ref_name }} is immutable."

      - name: Registry smoke — fresh install of the just-published version (real command/formula/save-load, all three delivery paths)
        run: |
          set -euo pipefail
          PKG_VERSION="${{ needs.package.outputs.version }}"
          # npm's registry is eventually consistent immediately after
          # publish; poll briefly rather than assuming instant visibility.
          for attempt in $(seq 1 10); do
            LATEST="$(npm view socialcalc version 2>/dev/null || echo "")"
            if [ "$LATEST" = "$PKG_VERSION" ]; then
              echo "Registry shows socialcalc@$LATEST (matches published $PKG_VERSION) after $attempt attempt(s)."
              break
            fi
            if [ "$attempt" -eq 10 ]; then
              echo "::error::npm registry still does not show socialcalc@$PKG_VERSION after 10 attempts (latest seen: ${LATEST:-none})"
              exit 1
            fi
            sleep 6
          done
          node scripts/verify-registry-smoke.mjs "$PKG_VERSION"
