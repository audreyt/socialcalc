name: LemmaScript

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dafny:
    name: lsc check (Dafny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Setup Dafny
        uses: dafny-lang/setup-dafny-action@v1
        with:
          dafny-version: "4.9.0"

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Generate + check Dafny models
        run: vp run verify:dafny

  lean-gen:
    name: lsc gen (Lean)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      # Full `lake build` needs sibling Loom/Velvet/LemmaScript checkouts and
      # solver downloads; CI only asserts Lean backend generation succeeds.
      - name: Generate Lean models from facade
        run: vp run verify:lean:gen

      - name: Assert Lean artifacts non-empty
        shell: bash
        run: |
          test -s lemma/a1.types.lean
          test -s lemma/a1.def.lean
          test -s lemma/a1.proof.lean
          test -s lemma/eval-ops.types.lean
          test -s lemma/eval-ops.def.lean
          test -s lemma/eval-ops.proof.lean
          test -s lemma/lookup-result.types.lean
          test -s lemma/lookup-result.def.lean
          test -s lemma/lookup-result.proof.lean
